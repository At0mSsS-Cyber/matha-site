<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NVR / DVR recorder">
  <defs>
    <linearGradient id="nv-top" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#39455c"/><stop offset="1" stop-color="#222a3a"/>
    </linearGradient>
    <linearGradient id="nv-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#283044"/><stop offset="0.5" stop-color="#1d2433"/><stop offset="1" stop-color="#141a27"/>
    </linearGradient>
    <linearGradient id="nv-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10151f"/><stop offset="1" stop-color="#222b3d"/>
    </linearGradient>
    <filter id="nv-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <ellipse cx="206" cy="244" rx="150" ry="16" fill="#02040a" opacity="0.5" filter="url(#nv-soft)"/>

  <!-- isometric box: top, side, front -->
  <path d="M64 128 L268 128 L320 96 L116 96 Z" fill="url(#nv-top)" stroke="#46536d" stroke-width="1.2"/>
  <path d="M268 128 L320 96 L320 188 L268 220 Z" fill="url(#nv-side)" stroke="#46536d" stroke-width="1.2"/>
  <rect x="64" y="128" width="204" height="92" rx="7" fill="url(#nv-front)" stroke="#46536d" stroke-width="1.2"/>

  <!-- top vents -->
  <g stroke="#2b3447" stroke-width="2" opacity="0.7"><path d="M150 110 L98 110"/><path d="M170 110 L118 110"/><path d="M190 110 L138 110"/></g>

  <!-- front fascia -->
  <rect x="78" y="138" width="176" height="3" rx="1.5" fill="#3a4660" opacity="0.7"/>
  <rect x="88" y="150" width="64" height="11" rx="3" fill="#313c52"/>
  <text x="96" y="159" font-family="Orbitron, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1.5" fill="#8fa0bd">NVR</text>

  <!-- LEDs -->
  <circle cx="96" cy="184" r="4" fill="#00e5ff"/><circle cx="96" cy="184" r="7" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.45"/>
  <circle cx="114" cy="184" r="4" fill="#25d366"/>
  <circle cx="132" cy="184" r="4" fill="#ff7a18"/>

  <!-- buttons / ports -->
  <rect x="196" y="176" width="24" height="15" rx="2.5" fill="#0c111a" stroke="#46536d" stroke-width="1"/>
  <rect x="226" y="178" width="16" height="11" rx="2" fill="#0c111a" stroke="#46536d" stroke-width="1"/>
</svg>
