<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PTZ speed dome CCTV camera">
  <defs>
    <linearGradient id="pt-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#bfc9d7"/>
    </linearGradient>
    <radialGradient id="pt-ball" cx="0.36" cy="0.26" r="0.95">
      <stop offset="0" stop-color="#5f6c80"/><stop offset="0.5" stop-color="#3a4452"/><stop offset="1" stop-color="#191f29"/>
    </radialGradient>
    <radialGradient id="pt-lens" cx="0.42" cy="0.36" r="0.78">
      <stop offset="0" stop-color="#4a5b75"/><stop offset="0.42" stop-color="#1a2333"/><stop offset="0.85" stop-color="#0a0f1a"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <filter id="pt-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <ellipse cx="200" cy="270" rx="96" ry="12" fill="#02040a" opacity="0.45" filter="url(#pt-soft)"/>

  <!-- ceiling cap + collar -->
  <rect x="132" y="40" width="136" height="22" rx="8" fill="url(#pt-top)" stroke="#9fabbb" stroke-width="1.2"/>
  <rect x="126" y="62" width="148" height="26" rx="7" fill="#eef3f9" stroke="#9fabbb" stroke-width="1.1"/>
  <path d="M126 90 a74 22 0 0 1 148 0 z" fill="url(#pt-top)" stroke="#9fabbb" stroke-width="1.1"/>

  <!-- speed-dome sphere -->
  <circle cx="200" cy="172" r="86" fill="url(#pt-ball)" stroke="#10151f" stroke-width="1.4"/>
  <ellipse cx="164" cy="134" rx="34" ry="17" fill="#ffffff" opacity="0.16" transform="rotate(-24 164 134)"/>

  <!-- lens window -->
  <ellipse cx="200" cy="196" rx="52" ry="46" fill="#0c121c"/>
  <ellipse cx="200" cy="196" rx="34" ry="32" fill="url(#pt-lens)"/>
  <path d="M181 180 a27 27 0 0 1 33 -3" fill="none" stroke="#7fdcff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <circle cx="189" cy="186" r="5" fill="#bfeeff" opacity="0.75"/>
  <circle cx="200" cy="196" r="11" fill="#04060c"/>
</svg>
