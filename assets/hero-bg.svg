<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract network background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8ff"/>
      <stop offset="0.55" stop-color="#eef2fe"/>
      <stop offset="1" stop-color="#e7ecfb"/>
    </linearGradient>
    <radialGradient id="o1"><stop offset="0" stop-color="#2e5bff" stop-opacity=".55"/><stop offset="1" stop-color="#2e5bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="o2"><stop offset="0" stop-color="#7c5cff" stop-opacity=".5"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></radialGradient>
    <radialGradient id="o3"><stop offset="0" stop-color="#16c6c6" stop-opacity=".42"/><stop offset="1" stop-color="#16c6c6" stop-opacity="0"/></radialGradient>
    <radialGradient id="o4"><stop offset="0" stop-color="#b06cff" stop-opacity=".4"/><stop offset="1" stop-color="#b06cff" stop-opacity="0"/></radialGradient>
    <radialGradient id="o5"><stop offset="0" stop-color="#2ea8ff" stop-opacity=".4"/><stop offset="1" stop-color="#2ea8ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow"><stop offset="0" stop-color="#2e5bff" stop-opacity=".85"/><stop offset="1" stop-color="#2e5bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowv"><stop offset="0" stop-color="#7c5cff" stop-opacity=".8"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>

  <!-- soft colour orbs (concentrated right/top) -->
  <circle cx="1250" cy="150" r="450" fill="url(#o1)"/>
  <circle cx="1500" cy="560" r="400" fill="url(#o2)"/>
  <circle cx="1040" cy="760" r="320" fill="url(#o3)"/>
  <circle cx="1400" cy="110" r="260" fill="url(#o4)"/>
  <circle cx="900"  cy="320" r="280" fill="url(#o5)"/>

  <!-- radar arcs -->
  <g fill="none" stroke="#7c5cff" stroke-opacity=".14" stroke-width="1.4">
    <circle cx="1300" cy="420" r="200"/>
    <circle cx="1300" cy="420" r="310"/>
    <circle cx="1300" cy="420" r="430"/>
  </g>

  <!-- futuristic node network -->
  <g stroke="#2e5bff" stroke-opacity=".28" stroke-width="1.3" fill="none">
    <path d="M980 300 L1120 210 L1290 290 L1180 440 L1340 500 L1180 440 L1040 540 L980 300"/>
    <path d="M1290 290 L1430 360 L1340 500 L1450 610 L1280 660 L1110 690 L1040 540"/>
    <path d="M1110 690 L1280 660 L1340 500"/>
  </g>
  <g fill="#2e5bff" fill-opacity=".7">
    <circle cx="980" cy="300" r="3.5"/><circle cx="1120" cy="210" r="3.5"/><circle cx="1290" cy="290" r="3.5"/>
    <circle cx="1180" cy="440" r="3.5"/><circle cx="1340" cy="500" r="3.5"/><circle cx="1040" cy="540" r="3.5"/>
    <circle cx="1430" cy="360" r="3.5"/><circle cx="1450" cy="610" r="3.5"/><circle cx="1280" cy="660" r="3.5"/>
    <circle cx="1110" cy="690" r="3.5"/>
  </g>

  <!-- glowing key nodes -->
  <circle cx="1290" cy="290" r="34" fill="url(#glow)"/><circle cx="1290" cy="290" r="6" fill="#2e5bff"/>
  <circle cx="1340" cy="500" r="30" fill="url(#glowv)"/><circle cx="1340" cy="500" r="6" fill="#7c5cff"/>
  <circle cx="1110" cy="690" r="26" fill="url(#glow)"/><circle cx="1110" cy="690" r="5" fill="#2e5bff"/>
  <circle cx="1120" cy="210" r="24" fill="url(#glowv)"/><circle cx="1120" cy="210" r="5" fill="#7c5cff"/>
</svg>
