<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Matha Computers and CCTV logo">
  <defs>
    <linearGradient id="mc-grad" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.55" stop-color="#2D6BFF"/>
      <stop offset="1" stop-color="#FF7A18"/>
    </linearGradient>
    <radialGradient id="mc-lens" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.6" stop-color="#2D6BFF"/>
      <stop offset="1" stop-color="#0B0F19"/>
    </radialGradient>
  </defs>
  <!-- Hex frame -->
  <path d="M32 3.5 56.7 17.75V46.25L32 60.5 7.3 46.25V17.75Z"
        fill="#0E1424" stroke="url(#mc-grad)" stroke-width="2.5"/>
  <!-- Circuit nodes -->
  <g stroke="url(#mc-grad)" stroke-width="1.4" opacity="0.85">
    <path d="M16 24 L24 24" />
    <path d="M40 40 L48 40" />
    <circle cx="15" cy="24" r="1.8" fill="#00E5FF" stroke="none"/>
    <circle cx="49" cy="40" r="1.8" fill="#FF7A18" stroke="none"/>
  </g>
  <!-- Stylised M -->
  <path d="M19 44 V22 L32 34 L45 22 V44" fill="none" stroke="url(#mc-grad)"
        stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Camera lens (aperture) -->
  <circle cx="32" cy="33" r="6.4" fill="url(#mc-lens)" stroke="#FF7A18" stroke-width="1.6"/>
  <circle cx="32" cy="33" r="2.2" fill="#0B0F19"/>
  <circle cx="34.2" cy="30.8" r="1" fill="#E8EEF7"/>
</svg>
