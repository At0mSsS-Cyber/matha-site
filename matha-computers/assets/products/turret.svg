<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Turret eyeball CCTV camera">
  <defs>
    <linearGradient id="tr-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#bcc6d4"/>
    </linearGradient>
    <radialGradient id="tr-ball" cx="0.36" cy="0.28" r="0.92">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.45" stop-color="#e6ecf4"/><stop offset="0.8" stop-color="#b3bdcc"/><stop offset="1" stop-color="#8a96a7"/>
    </radialGradient>
    <radialGradient id="tr-face" cx="0.42" cy="0.4" r="0.78">
      <stop offset="0" stop-color="#2c3a52"/><stop offset="0.45" stop-color="#141c2a"/><stop offset="0.85" stop-color="#0a0f18"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <radialGradient id="tr-lens" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#4a5b75"/><stop offset="0.42" stop-color="#1a2333"/><stop offset="0.85" stop-color="#0a0f1a"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <filter id="tr-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <ellipse cx="200" cy="266" rx="110" ry="14" fill="#02040a" opacity="0.45" filter="url(#tr-soft)"/>

  <!-- bracket arms + base -->
  <path d="M118 214 L142 156" stroke="#cdd7e2" stroke-width="22" stroke-linecap="round"/>
  <path d="M282 214 L258 156" stroke="#b6c0ce" stroke-width="22" stroke-linecap="round"/>
  <rect x="104" y="212" width="192" height="22" rx="11" fill="url(#tr-base)" stroke="#9fabbb" stroke-width="1.2"/>
  <circle cx="130" cy="223" r="2.6" fill="#7e8a98"/><circle cx="270" cy="223" r="2.6" fill="#7e8a98"/>

  <!-- eyeball housing -->
  <circle cx="200" cy="140" r="86" fill="url(#tr-ball)" stroke="#9fabbb" stroke-width="1.3"/>
  <ellipse cx="165" cy="98" rx="34" ry="17" fill="#ffffff" opacity="0.6" transform="rotate(-22 165 98)"/>

  <!-- angled dark face -->
  <ellipse cx="206" cy="146" rx="60" ry="56" fill="#0c121c"/>
  <ellipse cx="206" cy="146" rx="55" ry="51" fill="url(#tr-face)"/>
  <!-- IR ring dots -->
  <g fill="#aebacc"><circle cx="206" cy="100" r="3.6"/><circle cx="246" cy="146" r="3.6"/><circle cx="206" cy="192" r="3.6"/><circle cx="166" cy="146" r="3.6"/><circle cx="234" cy="118" r="3.2"/><circle cx="234" cy="174" r="3.2"/><circle cx="178" cy="174" r="3.2"/><circle cx="178" cy="118" r="3.2"/></g>
  <!-- lens -->
  <circle cx="206" cy="146" r="30" fill="#11161f"/>
  <circle cx="206" cy="146" r="27" fill="url(#tr-lens)"/>
  <path d="M188 130 a24 24 0 0 1 31 -3" fill="none" stroke="#7fdcff" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
  <circle cx="196" cy="136" r="5" fill="#bfeeff" opacity="0.78"/>
  <circle cx="206" cy="146" r="9" fill="#04060c"/>
</svg>
