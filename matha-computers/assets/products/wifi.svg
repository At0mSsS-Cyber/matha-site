<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wi-Fi IP CCTV camera">
  <defs>
    <linearGradient id="wf-body" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#e7edf4"/><stop offset="1" stop-color="#b9c4d2"/>
    </linearGradient>
    <linearGradient id="wf-stand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6dee8"/><stop offset="1" stop-color="#94a1b2"/>
    </linearGradient>
    <radialGradient id="wf-lens" cx="0.42" cy="0.36" r="0.78">
      <stop offset="0" stop-color="#4a5b75"/><stop offset="0.42" stop-color="#1a2333"/><stop offset="0.85" stop-color="#0a0f1a"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <filter id="wf-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <ellipse cx="196" cy="270" rx="92" ry="12" fill="#02040a" opacity="0.45" filter="url(#wf-soft)"/>

  <!-- base + neck -->
  <ellipse cx="176" cy="250" rx="46" ry="12" fill="url(#wf-stand)"/>
  <rect x="168" y="188" width="16" height="58" rx="8" fill="url(#wf-stand)"/>
  <circle cx="176" cy="184" r="11" fill="#9aa6b4"/><circle cx="176" cy="184" r="5" fill="#7e8a98"/>

  <!-- antenna -->
  <g transform="rotate(20 236 96)"><rect x="231" y="56" width="10" height="70" rx="5" fill="url(#wf-stand)"/><circle cx="236" cy="54" r="7.5" fill="#9aa6b4"/></g>

  <!-- cube body -->
  <rect x="92" y="98" width="142" height="100" rx="24" fill="url(#wf-body)" stroke="#9fabbb" stroke-width="1.2"/>
  <rect x="108" y="106" width="84" height="8" rx="4" fill="#ffffff" opacity="0.85"/>

  <!-- lens -->
  <circle cx="163" cy="150" r="42" fill="url(#wf-body)" stroke="#9fabbb" stroke-width="1.1"/>
  <circle cx="163" cy="150" r="33" fill="#11161f"/>
  <circle cx="163" cy="150" r="30" fill="url(#wf-lens)"/>
  <path d="M145 134 a25 25 0 0 1 32 -3" fill="none" stroke="#7fdcff" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
  <circle cx="153" cy="140" r="5" fill="#bfeeff" opacity="0.78"/>
  <circle cx="163" cy="150" r="9" fill="#04060c"/>

  <!-- status LED + wifi waves -->
  <circle cx="212" cy="120" r="4.5" fill="#ff7a18"/><circle cx="212" cy="120" r="8" fill="none" stroke="#ff7a18" stroke-width="1.4" opacity="0.5"/>
  <path d="M256 116 a22 22 0 0 1 0 34 M268 106 a36 36 0 0 1 0 54" stroke="#00e5ff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
</svg>
