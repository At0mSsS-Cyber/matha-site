<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dome CCTV camera">
  <defs>
    <linearGradient id="dm-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#c0cad8"/>
    </linearGradient>
    <radialGradient id="dm-dome" cx="0.36" cy="0.26" r="0.9">
      <stop offset="0" stop-color="#8f9bad"/><stop offset="0.5" stop-color="#586577"/><stop offset="1" stop-color="#262e3b"/>
    </radialGradient>
    <radialGradient id="dm-lens" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#4a5b75"/><stop offset="0.42" stop-color="#1a2333"/><stop offset="0.82" stop-color="#0a0f1a"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <filter id="dm-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <ellipse cx="200" cy="252" rx="116" ry="14" fill="#02040a" opacity="0.45" filter="url(#dm-soft)"/>

  <!-- ceiling base -->
  <ellipse cx="200" cy="166" rx="112" ry="30" fill="url(#dm-base)" stroke="#9fabbb" stroke-width="1.2"/>
  <ellipse cx="200" cy="160" rx="112" ry="28" fill="#eef3f9"/>
  <ellipse cx="200" cy="160" rx="112" ry="28" fill="none" stroke="#cdd7e2" stroke-width="1"/>

  <!-- smoked dome -->
  <path d="M96 162 a104 104 0 0 1 208 0 z" fill="url(#dm-dome)"/>
  <path d="M96 162 a104 104 0 0 1 208 0" fill="none" stroke="#39424f" stroke-width="1.3" opacity="0.55"/>
  <!-- glossy reflection -->
  <ellipse cx="156" cy="108" rx="42" ry="22" fill="#ffffff" opacity="0.20" transform="rotate(-24 156 108)"/>
  <ellipse cx="244" cy="132" rx="16" ry="9" fill="#ffffff" opacity="0.10" transform="rotate(-24 244 132)"/>

  <!-- inner lens -->
  <circle cx="200" cy="132" r="33" fill="#11161f"/>
  <circle cx="200" cy="132" r="30" fill="url(#dm-lens)"/>
  <path d="M181 116 a26 26 0 0 1 33 -3" fill="none" stroke="#7fdcff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <circle cx="189" cy="122" r="5" fill="#bfeeff" opacity="0.75"/>
  <circle cx="200" cy="132" r="10" fill="#04060c"/>
</svg>
